services:
  - type: web
    name: hujirun-backend
    runtime: python
    plan: free
    region: frankfurt
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    # Run DB migrations before serving so the schema + seed data are always in
    # sync with the deployed code. `alembic upgrade head` is idempotent — it's a
    # no-op when the DB is already current.
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: DATABASE_URL
        sync: false   # set this in the Render dashboard to your Neon Postgres URL
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: https://hujirun.vercel.app
